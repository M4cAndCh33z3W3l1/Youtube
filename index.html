<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mac Chat</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <!-- TOP BAR -->
  <header class="topbar">
    <a href="#" class="brand" id="brandLink">
      <span class="brand__icon"><i class="fas fa-tv"></i></span>
      <span class="brand__name">Mac Chat</span>
    </a>

    <div class="search-wrap" id="searchWrap">
      <i class="fas fa-search search-icon"></i>
      <input
        type="text"
        id="searchInput"
        placeholder="Search videos — or paste a YouTube URL to add it"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="clearBtn" class="clear-btn" title="Clear" style="display:none"><i class="fas fa-times"></i></button>
      <button id="searchBtn" class="search-go"><i class="fas fa-arrow-right"></i></button>
    </div>

    <div class="topbar__right">
      <button class="pill-btn" id="addBtn"><i class="fas fa-plus"></i> Add Video</button>
    </div>
  </header>

  <!-- CHIPS -->
  <div class="chips-bar" id="chipsBar">
    <div class="chips">
      <button class="chip active" data-cat="all">All</button>
      <button class="chip" data-cat="music">Music</button>
      <button class="chip" data-cat="gaming">Gaming</button>
      <button class="chip" data-cat="tech">Tech</button>
      <button class="chip" data-cat="comedy">Comedy</button>
      <button class="chip" data-cat="education">Education</button>
      <button class="chip" data-cat="sports">Sports</button>
      <button class="chip" data-cat="news">News</button>
      <button class="chip" data-cat="shorts">Shorts</button>
      <button class="chip" data-cat="vlog">Vlog</button>
    </div>
  </div>

  <!-- MAIN -->
  <main class="main">
    <div id="gridWrap">
      <div class="video-grid" id="videoGrid"></div>
      <button class="load-more-btn" id="loadMoreBtn" style="display:none">Show more</button>
    </div>
    <div class="search-results" id="searchResults" style="display:none">
      <p class="search-label" id="searchLabel"></p>
      <div class="video-grid" id="searchGrid"></div>
    </div>
  </main>

  <!-- PLAYER MODAL -->
  <div class="overlay" id="playerOverlay">
    <div class="player-modal">
      <button class="modal-close" id="closePlayer"><i class="fas fa-times"></i></button>
      <div class="player-frame-wrap">
        <iframe id="playerIframe" src="" frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen></iframe>
      </div>
      <div class="player-info">
        <h2 id="playerTitle" class="player-title">—</h2>
        <p id="playerChannel" class="player-channel"></p>
        <div class="player-actions">
          <a id="ytLink" href="#" target="_blank" rel="noopener" class="player-action-btn">
            <i class="fab fa-youtube"></i> Open on YouTube
          </a>
          <button class="player-action-btn" id="copyLinkBtn"><i class="fas fa-link"></i> Copy link</button>
          <button class="player-action-btn" id="removeBtn"><i class="fas fa-trash"></i> Remove</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ADD MODAL -->
  <div class="overlay" id="addOverlay">
    <div class="add-modal">
      <button class="modal-close" id="closeAdd"><i class="fas fa-times"></i></button>
      <h3 class="add-modal__title"><i class="fab fa-youtube"></i> Add a YouTube Video</h3>
      <p class="add-modal__hint">Paste any YouTube link — regular videos, Shorts, or live streams.</p>
      <input type="text" id="addUrlInput" class="add-modal__input" placeholder="https://www.youtube.com/watch?v=…"/>
      <div class="add-modal__section-label">Category <span style="color:var(--muted)">(optional)</span></div>
      <div class="chips" id="addCatChips" style="flex-wrap:wrap;gap:6px">
        <button class="chip active" data-addcat="all">All</button>
        <button class="chip" data-addcat="music">Music</button>
        <button class="chip" data-addcat="gaming">Gaming</button>
        <button class="chip" data-addcat="tech">Tech</button>
        <button class="chip" data-addcat="comedy">Comedy</button>
        <button class="chip" data-addcat="education">Education</button>
        <button class="chip" data-addcat="sports">Sports</button>
        <button class="chip" data-addcat="news">News</button>
        <button class="chip" data-addcat="shorts">Shorts</button>
        <button class="chip" data-addcat="vlog">Vlog</button>
      </div>
      <button class="add-modal__submit" id="addSubmitBtn"><i class="fas fa-plus"></i> Add to Mac Chat</button>
      <div class="add-modal__status" id="addStatus"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="main.js"></script>
</body>
</html>
